<!doctype html><html><head><meta charset="utf-8"><title>Claudium asset set</title>
<style>
  body{margin:0;background:#0c0a14;color:#e8ddc4;font:14px/1.5 -apple-system,system-ui,sans-serif}
  header{padding:22px 28px;border-bottom:1px solid #2a2440;position:sticky;top:0;background:#0c0a14e6;backdrop-filter:blur(6px)}
  h1{margin:0 0 4px;font-size:20px;color:#7ff6ee}
  h2{margin:34px 28px 12px;font-size:16px;color:#e8c15a;border-left:3px solid #6b3fd4;padding-left:10px}
  .sub{color:#9c8f6f;font-size:12px}
  .grid{display:flex;flex-wrap:wrap;gap:18px;padding:0 28px}
  .cell{background:#151125;border:1px solid #2a2440;border-radius:12px;padding:12px;text-align:center}
  .cell img,.cell video{display:block;border-radius:8px;background:#0c0a14}
  .cap{margin-top:8px;font-size:12px;color:#c9bfa4}
  .cap b{color:#7ff6ee}
  .icons img{width:120px;height:120px;object-fit:contain}
  .row{display:flex;flex-wrap:wrap;gap:14px;padding:0 28px;align-items:flex-end}
</style></head><body>
<header><h1>Claudium visual asset set</h1>
<div class="sub">Higgsfield Recraft V4.1 stills. Platinum coin, violet-to-cyan arcane core.</div></header>

<h2>Coin + action icons</h2>
<div class="row icons">
  <div class="cell"><img src="icons/claudium_coin_512.webp"><div class="cap"><b>coin</b> (the mark)</div></div>
  <div class="cell"><img src="icons/icon_wallet_512.webp"><div class="cap">wallet / balance</div></div>
  <div class="cell"><img src="icons/icon_buy_512.webp"><div class="cap">buy</div></div>
  <div class="cell"><img src="icons/icon_history_512.webp"><div class="cap">history</div></div>
  <div class="cell"><img src="icons/icon_store_512.webp"><div class="cap">store</div></div>
</div>
<h2>Denomination tiers</h2>
<div class="row icons">
  <div class="cell"><img src="icons/stack_single_512.webp"><div class="cap">single</div></div>
  <div class="cell"><img src="icons/stack_small_512.webp"><div class="cap">stack</div></div>
  <div class="cell"><img src="icons/stack_large_512.webp"><div class="cap">pile</div></div>
</div>

<div style="height:40px"></div>
</body></html>
